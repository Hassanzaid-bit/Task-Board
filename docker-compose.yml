services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskboard_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-taskboard}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskboard} -d ${POSTGRES_DB:-taskboard}"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://taskboard:taskboard_dev_password@db:5432/taskboard}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-real-deployments}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-480}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
